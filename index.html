<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>BitCraft World Map</title>

<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.min.js"></script>

<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="map"></div>

<div id="hud" class="hud">
  <div id="coords">— —</div>
  <button id="toggle-chunks" class="hud-btn" title="Toggle 32-small-hex chunk grid">Chunks</button>
  <button id="toggle-regions" class="hud-btn" title="Toggle region borders">Regions</button>
</div>

<div id="legend" class="legend"></div>

<script type="module" src="main.js"></script>
</body>
</html>
